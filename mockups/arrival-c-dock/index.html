<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Nima Hakimi — Motivated Dock (arrival variant C)</title>
<meta name="description" content="Prototype: arrival variant C — the nav home lights up first, a curved guide-line traces the path, and the drawn NH monogram follows that exact line into the nav as the name reveals." />

<!-- Type -->
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   TOKENS — brand constants (shared across all variants)
   ============================================================ */
:root{
  --bg:#0E0E10;
  --bg-soft:#141417;
  --text:#F5F5F0;
  --muted:#8A8A82;
  --line:rgba(245,245,240,.10);
  --accent:#C6FF3D;
  --accent-glow:rgba(198,255,61,.55);

  --display:"Clash Display","Satoshi",system-ui,sans-serif;
  --body:"Satoshi",system-ui,-apple-system,sans-serif;
  --mono:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;

  --ease:cubic-bezier(.16,1,.3,1);   /* expo.out — signature entrance curve */
  --pad:clamp(20px,5vw,72px);
  --maxw:1320px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  font-weight:400;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  min-height:100svh;
}
img,svg{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent);color:#0b0b0c}

/* subtle atmospheric depth so the near-black isn't flat */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(120% 90% at 50% -10%, rgba(198,255,61,.05), transparent 55%),
    radial-gradient(90% 70% at 50% 120%, rgba(255,255,255,.03), transparent 60%);
}

/* ============================================================
   NAV
   ============================================================ */
.nav{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;
  padding:18px var(--pad);
  backdrop-filter:saturate(120%) blur(6px);
}
.nav__logo-slot{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;flex:0 0 auto;
  border-radius:8px;
  color:var(--text);
}
.nav__logo-slot svg{width:28px;height:28px;overflow:visible}
/* logo starts invisible — it settles in at the end of the sequence */
.nav__logo-slot .logo-mono{opacity:0;transform:scale(.7);transform-origin:center}

/* "home lights up" ring — drawn around the slot BEFORE the monogram departs.
   It is an absolutely positioned box we animate via JS (opacity/scale/box-shadow). */
.nav__logo-ring{
  position:absolute;inset:-5px;
  border-radius:11px;
  border:1.5px solid var(--accent);
  opacity:0;
  pointer-events:none;
  box-shadow:0 0 0 0 var(--accent-glow);
  will-change:opacity,transform,box-shadow;
}

.nav__links{
  display:none;gap:26px;align-items:center;
  font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--muted);
}
.nav__links a{transition:color .2s var(--ease)}
.nav__links a:hover{color:var(--text)}
.nav__cta{
  font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.01em;
  color:#0b0b0c;background:var(--accent);
  padding:9px 16px;border-radius:999px;
  border:1px solid rgba(198,255,61,.6);
  box-shadow:0 0 0 0 var(--accent-glow);
  transition:box-shadow .25s var(--ease), transform .25s var(--ease);
}
.nav__cta:hover{box-shadow:0 6px 24px -6px var(--accent-glow);transform:translateY(-1px)}

@media(min-width:760px){.nav__links{display:flex}}

/* ============================================================
   HERO
   ============================================================ */
.hero{
  position:relative;z-index:1;
  max-width:var(--maxw);margin:0 auto;
  padding:clamp(40px,9vh,120px) var(--pad) clamp(60px,12vh,140px);
}
.hero__eyebrow{
  font-family:var(--mono);font-size:12px;font-weight:500;
  letter-spacing:.26em;text-transform:uppercase;color:var(--accent);
  display:inline-flex;align-items:center;gap:10px;
  margin-bottom:clamp(18px,4vh,34px);
}
.hero__eyebrow::before{
  content:"";width:26px;height:1px;background:var(--accent);opacity:.7;
}

.hero__title{
  font-family:var(--display);font-weight:700;
  font-size:clamp(52px,13vw,168px);
  line-height:.92;letter-spacing:-.02em;
  color:var(--text);
  margin:0 0 clamp(22px,4vh,40px);
  position:relative;
}
.hero__title .word{display:inline-block;white-space:nowrap}
/* masked reveal: each name word clipped by an overflow box; inner span
   slides up from yPercent:110 -> 0 (expo.out). */
.hero__title .mask{
  display:inline-block;
  overflow:hidden;
  vertical-align:bottom;
  padding-bottom:.06em;   /* room for descenders / italic overshoot */
}
.hero__title .mask > span{
  display:inline-block;
  transform:translateY(110%);
  will-change:transform;
}
#name-period{
  display:inline-block;color:var(--accent);
  opacity:0;transform:scale(.2);
  transform-origin:center bottom;
  will-change:transform,opacity;
}

.hero__lead{
  font-family:var(--body);font-weight:400;
  font-size:clamp(16px,2.1vw,21px);line-height:1.55;
  color:var(--muted);max-width:60ch;
}
.hero__lead b{color:var(--text);font-weight:500}
.hero__lead .acc{color:var(--accent)}

/* ============================================================
   ARRIVAL OVERLAY — sits ABOVE hero so the whole sequence reads
   with zero layout shift. Pointer-events none (replay handles input).
   ============================================================ */
.arrival{
  position:fixed;inset:0;z-index:60;pointer-events:none;
}
.arrival__veil{
  position:absolute;inset:0;
  background:var(--bg);
  opacity:1;will-change:opacity;
}

/* full-viewport SVG layer for the GUIDE-LINE (the path the mono will follow).
   It spans the viewport in CSS px so a userspace = px mapping is trivial. */
.guide{
  position:fixed;top:0;left:0;z-index:61;
  width:100vw;height:100vh;
  pointer-events:none;overflow:visible;
}
.guide__path{
  fill:none;
  stroke:var(--accent);
  stroke-width:2;
  stroke-linecap:round;
  opacity:0;
  filter:drop-shadow(0 0 4px rgba(198,255,61,.65))
         drop-shadow(0 0 9px rgba(198,255,61,.35));
  will-change:stroke-dashoffset,opacity;
}

/* the moving monogram — positioned/scaled in JS via transform */
.mono{
  position:fixed;top:0;left:0;z-index:62;
  width:120px;height:120px;
  transform-origin:0 0;
  pointer-events:none;
  will-change:transform,opacity;
}
.mono svg{width:120px;height:120px;overflow:visible;display:block}
.mono path{
  fill:none;
  stroke:var(--accent);
  stroke-width:8;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* the glowing spark dot that rides the drawing tip */
.spark{
  position:fixed;top:0;left:0;z-index:64;
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  transform:translate(-50%,-50%);
  pointer-events:none;
  opacity:0;
  box-shadow:
    0 0 6px 2px var(--accent-glow),
    0 0 14px 5px rgba(198,255,61,.35),
    0 0 30px 10px rgba(198,255,61,.18);
  will-change:transform,opacity;
}

/* ============================================================
   REPLAY
   ============================================================ */
.replay{
  position:fixed;right:16px;bottom:16px;z-index:80;
  font-family:var(--mono);font-size:12px;letter-spacing:.04em;
  color:var(--text);background:rgba(20,20,23,.7);
  border:1px solid var(--line);
  padding:9px 14px;border-radius:999px;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  backdrop-filter:blur(8px);
  transition:border-color .2s var(--ease), color .2s var(--ease);
}
.replay:hover{border-color:var(--accent);color:var(--accent)}
.replay__dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* filler so the page has body to scroll into */
.section{
  position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;
  padding:0 var(--pad) clamp(60px,12vh,120px);
}
.section__row{
  display:flex;flex-wrap:wrap;gap:14px 28px;align-items:center;
  padding-top:28px;border-top:1px solid var(--line);
  font-family:var(--mono);font-size:13px;color:var(--muted);
}
.section__row .tag{
  border:1px solid var(--line);border-radius:999px;padding:6px 12px;
}

/* ============================================================
   REDUCED MOTION — resting frame, no sequence
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
/* class applied by JS to compose the resting frame */
.is-resting .hero__title .mask > span{transform:none!important}
.is-resting #name-period{opacity:1!important;transform:none!important}
.is-resting .nav__logo-slot .logo-mono{opacity:1!important;transform:none!important}
.is-resting .nav__logo-ring{opacity:0!important}
.is-resting .arrival{display:none!important}
.is-resting .guide{display:none!important}
.is-resting .mono{display:none!important}
.is-resting .spark{display:none!important}
</style>
</head>
<body>

  <!-- ===================== NAV ===================== -->
  <nav class="nav" aria-label="Primary">
    <span class="nav__logo-slot" id="nav-logo-slot" aria-label="Nima Hakimi — home">
      <!-- the "home lights up" ring -->
      <span class="nav__logo-ring" id="nav-logo-ring" aria-hidden="true"></span>
      <!-- persistent logo monogram, handed off at the end -->
      <svg class="logo-mono" id="nav-logo-mono" viewBox="0 0 120 120" fill="none" aria-hidden="true">
        <path d="M22 96 L22 24 L74 92 L74 24" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M84 24 L84 96 M84 60 L112 60 M112 24 L112 96" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>

    <div class="nav__links">
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Writing</a>
    </div>

    <a class="nav__cta" href="#">Let's talk</a>
  </nav>

  <!-- ===================== HERO ===================== -->
  <header class="hero">
    <span class="hero__eyebrow">Frontend Developer</span>

    <h1 class="hero__title" id="hero-title" aria-label="Nima Hakimi.">
      <span class="word"><span class="mask"><span id="name-1">Nima</span></span></span>
      <span class="word"><span class="mask"><span id="name-2">Hakimi</span></span><span id="name-period">.</span></span>
    </h1>

    <p class="hero__lead">
      <b>Frontend developer with a designer's eye</b> — I build
      <span class="acc">accessible, expressive</span> interfaces.
      Currently at NAV.
    </p>
  </header>

  <section class="section" aria-hidden="true">
    <div class="section__row">
      <span class="tag">React</span>
      <span class="tag">TypeScript</span>
      <span class="tag">Motion</span>
      <span class="tag">Design Systems</span>
      <span class="tag">Accessibility</span>
    </div>
  </section>

  <!-- ===================== ARRIVAL OVERLAY ===================== -->
  <div class="arrival" id="arrival" aria-hidden="true">
    <div class="arrival__veil" id="veil"></div>
  </div>

  <!-- the GUIDE-LINE layer (viewport-sized; one path drawn at transition time) -->
  <svg class="guide" id="guide" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <!-- NOTE: we set the viewBox to match pixel dimensions at runtime so the
         path 'd' (in CSS px) maps 1:1. preserveAspectRatio=none + px viewBox. -->
    <path class="guide__path" id="guide-path" d="" vector-effect="non-scaling-stroke"></path>
  </svg>

  <!-- the drawing monogram (the SEED). Two paths: N then H. -->
  <div class="mono" id="mono" aria-hidden="true">
    <svg id="mono-svg" viewBox="0 0 120 120" fill="none">
      <!-- N: down the left stem, diagonal, up the right stem -->
      <path id="mono-N" d="M22 96 L22 24 L74 92 L74 24"/>
      <!-- H: left stem, crossbar, right stem -->
      <path id="mono-H" d="M84 96 L84 24 M84 60 L112 60 M112 24 L112 96"/>
    </svg>
  </div>

  <!-- the spark -->
  <div class="spark" id="spark" aria-hidden="true"></div>

  <!-- ===================== REPLAY ===================== -->
  <button class="replay" id="replay" type="button">
    <span class="replay__dot"></span> Replay
  </button>

  <!-- GSAP core only -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script>
  (function(){
    "use strict";

    /* ---------- guarded lookups ---------- */
    var $ = function(id){ return document.getElementById(id); };
    var els = {
      arrival:   $("arrival"),
      veil:      $("veil"),
      guide:     $("guide"),
      guidePath: $("guide-path"),
      mono:      $("mono"),
      monoSvg:   $("mono-svg"),
      pathN:     $("mono-N"),
      pathH:     $("mono-H"),
      spark:     $("spark"),
      name1:     $("name-1"),
      name2:     $("name-2"),
      period:    $("name-period"),
      navSlot:   $("nav-logo-slot"),
      navRing:   $("nav-logo-ring"),
      logoMono:  $("nav-logo-mono"),
      replay:    $("replay"),
      title:     $("hero-title")
    };
    // the inner slide spans inside the masks
    els.maskSpans = [els.name1, els.name2].filter(Boolean);

    var prefersReduced = window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* If a critical element is missing OR GSAP didn't load, bail to the
       composed resting frame so the page is always usable. */
    var critical = [els.arrival, els.veil, els.guide, els.guidePath, els.mono,
                    els.monoSvg, els.pathN, els.pathH, els.spark,
                    els.name1, els.name2, els.period, els.navSlot, els.title];
    var hasAll = critical.every(function(n){ return !!n; });

    function showResting(){
      document.body.classList.add("is-resting");
    }

    if (!hasAll || typeof window.gsap === "undefined" || prefersReduced){
      showResting();
      if (els.replay && (!hasAll || typeof window.gsap === "undefined")){
        els.replay.style.display = "none";
      }
      if (prefersReduced && els.replay) els.replay.style.display = "none";
      return;
    }

    var gsap = window.gsap;

    /* ---------- geometry helpers ---------- */

    // page-space rect (includes scroll) of an element's box
    function pageRect(el){
      var r = el.getBoundingClientRect();
      return {
        left:   r.left + window.scrollX,
        top:    r.top + window.scrollY,
        width:  r.width,
        height: r.height,
        cx:     r.left + window.scrollX + r.width/2,
        cy:     r.top + window.scrollY + r.height/2
      };
    }

    // Convert an SVG userspace point (in the mono's 0..120 viewBox) to a
    // PAGE-space pixel using the LIVE rendered rect of the mono svg.
    function monoPointToPage(x, y){
      var r = els.monoSvg.getBoundingClientRect();
      var px = r.left + window.scrollX + (x/120) * r.width;
      var py = r.top  + window.scrollY + (y/120) * r.height;
      return { x:px, y:py };
    }

    /* ---------- combined NH path sampling (N then H) — PART 1 ---------- */
    var lenN = els.pathN.getTotalLength();
    var lenH = els.pathH.getTotalLength();
    var lenTotal = lenN + lenH;

    function tipAt(p){
      var d = p * lenTotal, pt;
      if (d <= lenN){ pt = els.pathN.getPointAtLength(d); }
      else { pt = els.pathH.getPointAtLength(Math.min(d - lenN, lenH)); }
      return monoPointToPage(pt.x, pt.y);
    }

    function primeDraw(){
      gsap.set(els.pathN, { strokeDasharray: lenN, strokeDashoffset: lenN, stroke:"#C6FF3D" });
      gsap.set(els.pathH, { strokeDasharray: lenH, strokeDashoffset: lenH, stroke:"#C6FF3D" });
    }

    /* ---------- the GUIDE-LINE (PART 2) ----------
       The guide layer is a viewport-sized SVG whose viewBox we set to the
       pixel size of the viewport (preserveAspectRatio=none), so path 'd'
       coordinates are in CSS px (viewport-relative, NOT page-relative).
       We build a quadratic Bézier from the centered mono's center to the
       nav-slot center, bowed sideways so it is a real curve, then sample
       THE SAME path with getPointAtLength so the monogram visibly follows it. */
    function sizeGuideViewBox(){
      var w = window.innerWidth, h = window.innerHeight;
      els.guide.setAttribute("viewBox", "0 0 " + w + " " + h);
      els.guide.setAttribute("width", w);
      els.guide.setAttribute("height", h);
    }

    // returns {d, len} where d is built in viewport px. start/end are viewport
    // px points (NOT page px) — guide is position:fixed.
    var guideGeom = null;
    function buildGuidePath(startVp, endVp){
      var sx = startVp.x, sy = startVp.y, ex = endVp.x, ey = endVp.y;
      // midpoint
      var mx = (sx + ex) / 2, my = (sy + ey) / 2;
      // perpendicular to the chord, used to bow the curve into an arc
      var dx = ex - sx, dy = ey - sy;
      var dist = Math.hypot(dx, dy) || 1;
      // unit perpendicular
      var px = -dy / dist, py = dx / dist;
      // bow amount scales with distance; sign chosen so the arc bows toward the
      // left/up reading direction (toward the page interior, feels intentional).
      var bow = Math.min(170, Math.max(60, dist * 0.26));
      // ensure the control point lifts UP-and-toward-interior: pick the
      // perpendicular direction whose y is negative (upward bow) for a graceful arc.
      if (py > 0){ px = -px; py = -py; }
      var cx = mx + px * bow;
      var cy = my + py * bow;
      var d = "M " + sx + " " + sy + " Q " + cx + " " + cy + " " + ex + " " + ey;
      els.guidePath.setAttribute("d", d);
      var len = els.guidePath.getTotalLength();
      guideGeom = { d:d, len:len, startVp:startVp, endVp:endVp };
      return guideGeom;
    }

    // Sample the guide path at progress p (0..1). Returns VIEWPORT px point.
    function guidePointAt(p){
      var len = guideGeom.len;
      var pt = els.guidePath.getPointAtLength(p * len);
      return { x: pt.x, y: pt.y };
    }

    /* ---------- centered placement of the mono (Part 1 rest) ---------- */
    var centeredState = null;
    function placeMonoCentered(){
      var vw = window.innerWidth, vh = window.innerHeight;
      var displaySize = Math.min(vw, vh) * 0.34;
      displaySize = Math.max(150, Math.min(displaySize, 320));
      var scale = displaySize / 120;
      var x = window.scrollX + vw/2 - displaySize/2;
      var y = window.scrollY + vh*0.44 - displaySize/2;
      centeredState = { x:x, y:y, scale:scale, size:displaySize };
      gsap.set(els.mono, { x:x, y:y, scale:scale });
    }

    /* ---------- docked transform (mono shrunk into the nav slot) ---------- */
    function computeDockedState(){
      var rs = pageRect(els.navSlot);            // nav slot, ~28px
      // fit the 120-userspace mono into the slot with a little inset
      var target = Math.min(rs.width, rs.height) * 0.96;
      var scale = target / 120;
      var x = rs.cx - (120 * scale) / 2;
      var y = rs.cy - (120 * scale) / 2;
      return { x:x, y:y, scale:scale };
    }

    /* ---------- reset of all animated props ---------- */
    function resetAll(){
      document.body.classList.remove("is-resting");

      sizeGuideViewBox();

      gsap.set(els.arrival, { display:"block" });
      gsap.set(els.veil, { opacity:1 });

      gsap.set(els.mono, { opacity:1 });

      // guide hidden / undrawn
      gsap.set(els.guidePath, { opacity:0 });
      els.guidePath.setAttribute("d", "");

      // name masks: inner spans pushed below their mask, period hidden
      gsap.set(els.maskSpans, { yPercent:110 });
      gsap.set(els.period, { opacity:0, scale:.2 });

      // nav: logo hidden, ring off
      if (els.logoMono) gsap.set(els.logoMono, { opacity:0, scale:.7 });
      if (els.navRing)  gsap.set(els.navRing, { opacity:0, scale:.6, boxShadow:"0 0 0 0 rgba(198,255,61,.0)" });

      gsap.set(els.spark, { opacity:0 });

      primeDraw();
      placeMonoCentered();
    }

    /* ---------- the sequence ---------- */
    var tl = null;

    function build(){
      resetAll();

      tl = gsap.timeline({ defaults:{ ease:"expo.out" } });

      /* ===== PART 1 — NH draws on (IDENTICAL across variants; ~0.0–1.0s) ===== */
      tl.add(function(){
        var t0 = tipAt(0);
        gsap.set(els.spark, { x:t0.x, y:t0.y, opacity:1 });
      }, 0);

      var draw = { p:0 };
      tl.to(draw, {
        p:1, duration:0.9, ease:"expo.out",
        onUpdate:function(){
          var p = draw.p;
          var drawn = p * lenTotal;
          els.pathN.style.strokeDashoffset = Math.max(0, lenN - drawn);
          var drawnH = Math.max(0, drawn - lenN);
          els.pathH.style.strokeDashoffset = Math.max(0, lenH - drawnH);
          var t = tipAt(p);
          gsap.set(els.spark, { x:t.x, y:t.y });
        }
      }, 0.05);

      // "ink drying": each stroke settles lime -> off-white after it finishes
      tl.to(els.pathN, { stroke:"#F5F5F0", duration:0.35, ease:"power1.out" }, 0.05 + 0.9 * (lenN/lenTotal) + 0.05);
      tl.to(els.pathH, { stroke:"#F5F5F0", duration:0.35, ease:"power1.out" }, 0.05 + 0.9 + 0.04);

      // park spark exactly at the path end
      tl.add(function(){
        var tEnd = tipAt(1);
        gsap.set(els.spark, { x:tEnd.x, y:tEnd.y });
      }, 0.05 + 0.9);

      /* ===== PART 2 — "Motivated dock — show it the way" (~1.0–2.3s) ===== */

      /* 1) (1.0–1.25s) HOME LIGHTS UP FIRST — establish the target before the
            monogram leaves. The nav-slot ring switches ON and pulses. */
      tl.add(function(){
        if (!els.navRing) return;
        gsap.set(els.navRing, { opacity:0, scale:.6 });
        gsap.to(els.navRing, {
          opacity:1, scale:1, duration:0.22, ease:"back.out(2.6)",
          boxShadow:"0 0 0 3px rgba(198,255,61,.18), 0 0 16px 2px rgba(198,255,61,.45)"
        });
        // gentle pulse to read as "active / waiting for the monogram"
        gsap.to(els.navRing, {
          boxShadow:"0 0 0 5px rgba(198,255,61,.06), 0 0 22px 4px rgba(198,255,61,.30)",
          duration:0.55, ease:"sine.inOut", yoyo:true, repeat:1, delay:0.22
        });
      }, 1.0);

      /* 2) (1.2–1.65s) GUIDE-LINE TRACES THE PATH — a curved (quadratic) arc
            from the centered monogram center to the nav-slot center, drawn on
            via strokeDashoffset full->0 with a soft glow. */
      tl.add(function(){
        sizeGuideViewBox();
        // start = current centered mono CENTER, in VIEWPORT px (guide is fixed)
        var ms = centeredState;
        var startVp = {
          x: (ms.x - window.scrollX) + ms.size/2,
          y: (ms.y - window.scrollY) + ms.size/2
        };
        // end = nav-slot center in VIEWPORT px
        var rs = els.navSlot.getBoundingClientRect();
        var endVp = { x: rs.left + rs.width/2, y: rs.top + rs.height/2 };

        buildGuidePath(startVp, endVp);

        var L = guideGeom.len;
        gsap.set(els.guidePath, { strokeDasharray:L, strokeDashoffset:L, opacity:1 });
        gsap.to(els.guidePath, {
          strokeDashoffset:0, duration:0.45, ease:"power2.out"
        });
      }, 1.2);

      /* 3) (1.6–2.05s) THE MONOGRAM FOLLOWS THE LINE — sample THE SAME guide
            path with getPointAtLength and set the mono position to it, while
            scaling down to the nav-slot size. Dock with a back.out overshoot.
            The guide-line fades out as the mono arrives. */
      tl.add(function(){
        var docked = computeDockedState();        // measured live
        var startScale = centeredState.scale;
        var move = { p:0 };
        // we lead the spark along too so the "tip" energy travels with it.
        gsap.to(move, {
          p:1, duration:0.45, ease:"back.out(1.6)",
          onUpdate:function(){
            var p = move.p;
            // clamp p for path sampling (back.out overshoots >1); the scale &
            // settle still use the eased p for the springy dock feel.
            var ps = Math.max(0, Math.min(1, p));
            var vp = guidePointAt(ps);
            // viewport px -> page px for the fixed mono (top/left + scroll)
            var pageX = vp.x + window.scrollX;
            var pageY = vp.y + window.scrollY;
            // current uniform scale: interpolate using the (possibly >1) p so
            // the back.out overshoot reads as a tiny settle at the dock.
            var sc = startScale + (docked.scale - startScale) * p;
            sc = Math.max(docked.scale * 0.96, sc); // guard against negative dip
            // position so the mono CENTER sits on the sampled point
            var half = 120 * sc / 2;
            gsap.set(els.mono, { x: pageX - half, y: pageY - half, scale: sc });
            // spark rides the leading center as it travels
            gsap.set(els.spark, { x: pageX, y: pageY, opacity: 1 - ps*0.15 });
          }
        });
        // guide fades out as the mono arrives
        gsap.to(els.guidePath, { opacity:0, duration:0.30, ease:"power2.in", delay:0.18 });
      }, 1.6);

      /* HAND-OFF: reveal the real nav logo + hide the flyer with no gap.
         At 2.05 the mono has docked; cross in the persistent logo on the SAME
         frame we hide the flyer. */
      tl.add(function(){
        if (els.logoMono){
          gsap.set(els.logoMono, { opacity:1, scale:1 });
        }
        gsap.set(els.mono, { opacity:0 });
        // settle the ring back to a calm "home" state
        if (els.navRing){
          gsap.to(els.navRing, {
            opacity:0, duration:0.45, ease:"power2.out",
            boxShadow:"0 0 0 0 rgba(198,255,61,0)"
          });
        }
      }, 2.05);

      /* 4) (1.85–2.3s) NAME + PERIOD.
            The hero name reveals (masked yPercent 110->0, expo.out) as the
            monogram docks; then the parked spark flies to #name-period and
            becomes the lime period (back.out). */
      tl.to(els.name1, { yPercent:0, duration:0.7, ease:"expo.out" }, 1.85);
      tl.to(els.name2, { yPercent:0, duration:0.7, ease:"expo.out" }, 1.95);

      tl.add(function(){
        var rp = pageRect(els.period);
        var px = rp.left + rp.width * 0.5;
        var py = rp.top + rp.height * 0.80;
        gsap.set(els.spark, { opacity:1 });
        gsap.to(els.spark, {
          x:px, y:py, duration:0.24, ease:"power2.in",
          onComplete:function(){
            gsap.set(els.spark, { opacity:0 });
            gsap.to(els.period, {
              opacity:1, scale:1, duration:0.5, ease:"back.out(2.4)"
            });
          }
        });
      }, 2.06);

      // tidy: hide overlay + guide after everything resolves
      tl.add(function(){
        gsap.set(els.arrival, { display:"none" });
        gsap.set(els.guide, { display:"none" });
      }, 2.45);

      return tl;
    }

    /* ---------- run / replay ---------- */
    function play(){
      if (tl) tl.kill();
      gsap.set(els.guide, { display:"block" });
      if (window.scrollY > 4) window.scrollTo(0,0);
      build();
    }

    els.replay.addEventListener("click", play);

    // recompute centered placement / guide size on resize while overlay shows
    var rt;
    window.addEventListener("resize", function(){
      clearTimeout(rt);
      rt = setTimeout(function(){
        if (els.arrival && els.arrival.style.display !== "none" && els.mono){
          sizeGuideViewBox();
          placeMonoCentered();
        }
      }, 120);
    });

    // wait for fonts so glyph rects are accurate, then play
    function start(){ play(); }
    if (document.fonts && document.fonts.ready){
      document.fonts.ready.then(start).catch(start);
      setTimeout(function(){ if(!tl) start(); }, 1200);
    } else {
      window.addEventListener("load", start);
    }
  })();
  </script>
</body>
</html>
