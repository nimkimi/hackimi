<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Nima Hakimi — The Spark (arrival v2)</title>
<meta name="description" content="Prototype: 'The Spark' arrival animation — a single acid-lime spark builds the NH monogram, docks it as the logo, and becomes the period." />

<!-- Type -->
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   TOKENS — brand constants (match the site)
   ============================================================ */
:root{
  --bg:#0E0E10;
  --bg-soft:#141417;
  --text:#F5F5F0;
  --muted:#8A8A82;
  --line:rgba(245,245,240,.10);
  --accent:#C6FF3D;
  --accent-glow:rgba(198,255,61,.55);

  --display:"Clash Display","Satoshi",system-ui,sans-serif;
  --body:"Satoshi",system-ui,-apple-system,sans-serif;
  --mono:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;

  --ease:cubic-bezier(.16,1,.3,1);   /* expo.out — signature entrance curve */
  --pad:clamp(20px,5vw,72px);
  --maxw:1320px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  font-weight:400;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  min-height:100vh;
}
img,svg{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent);color:#0b0b0c}

/* subtle atmospheric depth so the near-black isn't flat */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(120% 90% at 50% -10%, rgba(198,255,61,.05), transparent 55%),
    radial-gradient(90% 70% at 50% 120%, rgba(255,255,255,.03), transparent 60%);
}

/* ============================================================
   NAV
   ============================================================ */
.nav{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;
  padding:18px var(--pad);
  backdrop-filter:saturate(120%) blur(6px);
}
.nav__logo-slot{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;flex:0 0 auto;
  color:var(--text);
}
.nav__logo-slot svg{width:28px;height:28px;overflow:visible}
.nav__links{
  display:none;gap:26px;align-items:center;
  font-family:var(--mono);font-size:12px;letter-spacing:.04em;
  text-transform:uppercase;color:var(--muted);
}
.nav__links a{transition:color .25s var(--ease)}
.nav__links a:hover{color:var(--text)}
@media (min-width:760px){ .nav__links{display:flex} }
.nav__cta{
  font-family:var(--mono);font-size:12px;letter-spacing:.03em;
  text-transform:uppercase;font-weight:500;
  color:#0b0b0c;background:var(--accent);
  padding:9px 16px;border-radius:999px;
  transition:transform .3s var(--ease), box-shadow .3s var(--ease);
}
.nav__cta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(198,255,61,.28)}

/* ============================================================
   HERO  (lives in final layout, under the overlay)
   ============================================================ */
.hero{
  position:relative;z-index:1;
  min-height:calc(100vh - 64px);
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(48px,12vh,140px) var(--pad) clamp(40px,8vh,90px);
  max-width:var(--maxw);margin:0 auto;
}
.hero__eyebrow{
  font-family:var(--mono);font-size:12px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:12px;margin-bottom:clamp(20px,4vh,34px);
}
.hero__eyebrow::before{
  content:"";width:30px;height:1px;background:var(--muted);display:inline-block;
}
.hero__name{
  font-family:var(--display);font-weight:700;
  font-size:clamp(56px,15vw,168px);
  line-height:.92;letter-spacing:-.02em;
  margin-bottom:clamp(22px,5vh,40px);
}
/* each line gets a clip mask so the words slide up from behind it */
.hero__line{display:block;overflow:hidden;padding-bottom:.06em;}
.hero__line > span{display:inline-block;will-change:transform}
/* the period is its own element — the spark becomes this */
#name-period{
  display:inline-block;color:var(--accent);
  transform-origin:60% 90%;
}
.hero__lede{
  font-family:var(--body);font-weight:400;
  font-size:clamp(16px,2.3vw,22px);
  color:var(--muted);max-width:46ch;
}
.hero__lede strong{color:var(--text);font-weight:500}
.hero__meta{
  margin-top:clamp(34px,7vh,72px);
  display:flex;flex-wrap:wrap;gap:10px 26px;
  font-family:var(--mono);font-size:12px;letter-spacing:.04em;
  text-transform:uppercase;color:var(--muted);
}
.hero__meta span{display:inline-flex;align-items:center;gap:8px}
.hero__meta span::before{
  content:"";width:5px;height:5px;border-radius:50%;
  background:var(--accent);opacity:.8;
}

/* elements that fade up into place after the wipe */
.fade-up{opacity:0;transform:translateY(18px)}

/* ============================================================
   OVERLAY — the arrival stage (sits on top, no layout shift)
   ============================================================ */
#overlay{
  position:fixed;inset:0;z-index:90;
  background:var(--bg);
  /* clip-wipe: starts fully covering, animates inset top->100% */
  clip-path:inset(0 0 0 0);
  will-change:clip-path;
  overflow:hidden;
}
/* the lime leading edge that rides the wipe */
#wipe-edge{
  position:absolute;left:0;right:0;
  height:2px;bottom:0;
  background:linear-gradient(90deg, transparent, var(--accent) 18%, var(--accent) 82%, transparent);
  box-shadow:0 0 18px 2px var(--accent-glow), 0 0 60px 6px rgba(198,255,61,.25);
  opacity:0;
  will-change:transform,opacity;
}

/* the intro monogram lives in the overlay, absolutely centered */
#intro-mono{
  position:absolute;left:50%;top:50%;
  width:clamp(140px,32vw,240px);
  height:clamp(140px,32vw,240px);
  transform:translate(-50%,-50%);
  transform-origin:50% 50%;
  will-change:transform,opacity;
}
#mono-svg{width:100%;height:100%;overflow:visible}
.mono-stroke{
  fill:none;
  stroke:var(--text);
  stroke-width:6;
  stroke-linecap:round;
  stroke-linejoin:round;
  /* primed in JS via dasharray/offset */
}

/* the spark — protagonist. layered glow via box-shadow */
#spark{
  position:fixed;left:0;top:0;z-index:95;
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  /* sits at element origin; we translate it */
  transform:translate(-50%,-50%);
  margin-left:-4.5px;margin-top:-4.5px; /* center the dot on its x/y */
  box-shadow:
    0 0 6px 1px rgba(198,255,61,.9),
    0 0 16px 3px var(--accent-glow),
    0 0 36px 8px rgba(198,255,61,.32),
    0 0 70px 16px rgba(198,255,61,.14);
  opacity:0;
  will-change:transform,opacity;
  pointer-events:none;
}

/* nav-slot mark, hidden until handoff so we can swap without a frame gap */
#nav-logo-slot svg .mono-stroke{stroke-width:8}

/* ============================================================
   REPLAY BUTTON
   ============================================================ */
#replay{
  position:fixed;right:16px;bottom:16px;z-index:120;
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
  background:rgba(20,20,23,.7);
  border:1px solid var(--line);
  padding:9px 14px;border-radius:999px;
  backdrop-filter:blur(8px);
  cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  transition:color .25s var(--ease),border-color .25s var(--ease),transform .25s var(--ease);
}
#replay:hover{color:var(--text);border-color:rgba(198,255,61,.5);transform:translateY(-1px)}
#replay::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 8px var(--accent-glow);
}
#replay:disabled{opacity:.4;cursor:default;transform:none}

/* ============================================================
   REDUCED MOTION — designed static resting frame
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important}
}
</style>
</head>
<body>

<!-- ===================== NAV ===================== -->
<header class="nav">
  <a class="nav__logo-slot" id="nav-logo-slot" href="#top" aria-label="Nima Hakimi — home">
    <svg viewBox="0 0 120 120" aria-hidden="true">
      <path class="mono-stroke" d="M22 92 L22 28 L62 92 L62 28" />
      <path class="mono-stroke" d="M76 28 L76 92 M76 60 L106 60 M106 28 L106 92" />
    </svg>
  </a>

  <nav class="nav__links" aria-label="Primary">
    <a href="#work">Work</a>
    <a href="#play">Playground</a>
    <a href="#about">About</a>
  </nav>

  <a class="nav__cta" href="#contact">Let's talk</a>
</header>

<!-- ===================== HERO ===================== -->
<main id="top">
  <section class="hero">
    <p class="hero__eyebrow fade-up">Frontend Developer</p>

    <h1 class="hero__name" id="hero-name" aria-label="Nima Hakimi.">
      <span class="hero__line"><span data-line>Nima</span></span>
      <span class="hero__line"><span data-line>Hakimi<i id="name-period" aria-hidden="true">.</i></span></span>
    </h1>

    <p class="hero__lede fade-up">
      A <strong>frontend developer with a designer's eye</strong> — building
      accessible, expressive interfaces where the engineering is as considered
      as the art direction.
    </p>

    <div class="hero__meta fade-up">
      <span>Available 2026</span>
      <span>React / TypeScript</span>
      <span>Motion &amp; Systems</span>
    </div>
  </section>
</main>

<!-- ===================== REPLAY ===================== -->
<button id="replay" type="button" aria-label="Replay the arrival animation">Replay</button>

<!-- ===================== OVERLAY (arrival stage) ===================== -->
<div id="overlay" aria-hidden="true">
  <div id="wipe-edge"></div>
  <div id="intro-mono">
    <svg viewBox="0 0 120 120" id="mono-svg">
      <!-- N: two verticals + diagonal (single open path so it draws as one gesture) -->
      <path class="mono-stroke" id="path-n" d="M22 92 L22 28 L62 92 L62 28" />
      <!-- H: left vertical, crossbar, right vertical (single open path) -->
      <path class="mono-stroke" id="path-h" d="M76 92 L76 28 M76 60 L106 60 M106 28 L106 92" />
    </svg>
  </div>
</div>

<!-- the spark — outside the overlay so it survives the clip + flies to the period -->
<div id="spark" aria-hidden="true"></div>

<!-- ===================== LIBS ===================== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>

<script>
(function(){
  "use strict";

  var REDUCED = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  var hasGSAP = typeof window.gsap !== "undefined";

  /* ---------- element lookups (all guarded) ---------- */
  var overlay   = document.getElementById("overlay");
  var wipeEdge  = document.getElementById("wipe-edge");
  var introMono = document.getElementById("intro-mono");
  var pathN     = document.getElementById("path-n");
  var pathH     = document.getElementById("path-h");
  var spark     = document.getElementById("spark");
  var navSlot   = document.getElementById("nav-logo-slot");
  var period    = document.getElementById("name-period");
  var replayBtn = document.getElementById("replay");
  var heroName  = document.getElementById("hero-name");
  var lines     = heroName ? heroName.querySelectorAll("[data-line]") : [];
  var fades     = document.querySelectorAll(".fade-up");

  // if anything critical is missing, bail to a safe visible state.
  if(!overlay || !introMono || !spark || !navSlot || !period){
    if(overlay){ overlay.style.display = "none"; }
    showResting();
    return;
  }

  /* ---------- helpers ---------- */
  function set(el, props){ if(el && hasGSAP) gsap.set(el, props); }

  // Compose the final resting page with zero motion (reduced-motion / fallback).
  function showResting(){
    if(overlay){ overlay.style.display = "none"; }
    if(spark){ spark.style.opacity = "0"; spark.style.display = "none"; }
    if(period){ period.style.opacity = "1"; period.style.transform = "none"; }
    for(var i=0;i<lines.length;i++){
      lines[i].style.transform = "none"; lines[i].style.opacity = "1";
    }
    for(var j=0;j<fades.length;j++){
      fades[j].style.opacity = "1"; fades[j].style.transform = "none";
    }
  }

  /* ---------- path priming for the draw-on ---------- */
  // returns total length, and primes dasharray/offset so the stroke is hidden.
  function prime(path){
    var len = path.getTotalLength();
    if(hasGSAP){
      gsap.set(path, {
        strokeDasharray: len,
        strokeDashoffset: len,
        stroke: "#C6FF3D"          // starts lime; "dries" to ink later
      });
    }
    return len;
  }

  // Map a global progress 0..1 across the two segments (N then H) to an
  // absolute point in the OVERLAY's pixel space (for riding the spark on the tip).
  // We weight by each path's length so the spark speed feels even.
  function pointAtGlobal(g){
    var lenN = pathN.getTotalLength();
    var lenH = pathH.getTotalLength();
    var total = lenN + lenH;
    var dist = g * total;
    var local, path;
    if(dist <= lenN){ path = pathN; local = dist; }
    else { path = pathH; local = Math.min(dist - lenN, lenH); }
    var pt = path.getPointAtLength(local); // in SVG viewBox (0..120) units

    // convert viewBox point -> page px using the rendered svg rect
    var svg = document.getElementById("mono-svg");
    var r = svg.getBoundingClientRect();
    return {
      x: r.left + (pt.x / 120) * r.width,
      y: r.top  + (pt.y / 120) * r.height
    };
  }

  /* ---------- prepare a clean start state ---------- */
  function reset(){
    if(!hasGSAP) return;
    gsap.killTweensOf([overlay, wipeEdge, introMono, spark, period, navSlot]);
    gsap.killTweensOf(lines); gsap.killTweensOf(fades);

    // overlay covers everything again
    gsap.set(overlay, { display:"block", clipPath:"inset(0 0 0 0)" });
    gsap.set(wipeEdge, { opacity:0, bottom:0 });

    // monogram centered, full size, primed strokes
    gsap.set(introMono, { x:0, y:0, scale:1, opacity:1, transformOrigin:"50% 50%" });
    prime(pathN); prime(pathH);

    // nav mark hidden until handoff (so we swap without a 1-frame gap)
    gsap.set(navSlot, { opacity:0 });

    // spark hidden at center
    var c = pointAtGlobal(0);
    gsap.set(spark, { x:c.x, y:c.y, opacity:0, scale:1, display:"block" });

    // hero hidden behind masks
    gsap.set(lines, { yPercent:110 });
    gsap.set(fades, { opacity:0, y:18 });
    gsap.set(period, { opacity:0, scale:0, transformOrigin:"60% 90%" });
  }

  /* ---------- THE ARRIVAL — "The Spark" ---------- */
  function play(){
    if(!hasGSAP){ showResting(); return; }
    if(replayBtn) replayBtn.disabled = true;
    reset();

    var driver = { p:0 };               // drives the construction draw
    var tl = gsap.timeline({
      defaults:{ ease:"expo.out" },   // signature entrance curve = cubic-bezier(.16,1,.3,1)
      onComplete:function(){ finish(); }
    });

    // --- 1. ANTICIPATION (0.0 -> 0.35): spark fades in + one pulse ---
    tl.to(spark, { opacity:1, duration:.18, ease:"power2.out" }, 0.00);
    tl.to(spark, { scale:2.1, duration:.12, ease:"power2.out" }, 0.08);
    tl.to(spark, { scale:1,   duration:.16, ease:"power2.inOut" }, 0.20);

    // --- 2. CONSTRUCTION (0.35 -> 1.15): spark traces, NH builds in its wake ---
    // draw both strokes by tweening dashoffset to 0, weighted across the timeline
    var lenN = pathN.getTotalLength();
    var lenH = pathH.getTotalLength();
    // N draws first, H follows — overlapping slightly for flow
    tl.to(pathN, { strokeDashoffset:0, duration:0.46, ease:"none" }, 0.35);
    tl.to(pathH, { strokeDashoffset:0, duration:0.36, ease:"none" }, 0.79);

    // spark rides the tip: single driver 0->1 over the whole construction
    tl.to(driver, {
      p:1, duration:0.80, ease:"none",
      onUpdate:function(){
        var pt = pointAtGlobal(driver.p);
        gsap.set(spark, { x:pt.x, y:pt.y });
      }
    }, 0.35);

    // "ink drying": each segment settles lime -> off-white shortly after it finishes
    tl.to(pathN, { stroke:"#F5F5F0", duration:0.45, ease:"power1.out" }, 0.70);
    tl.to(pathH, { stroke:"#F5F5F0", duration:0.45, ease:"power1.out" }, 1.08);

    // --- 3. ANTICIPATION + ARC LAUNCH (1.15 -> 1.4) ---
    // measure the nav slot at runtime (mobile-first)
    var slotRect = navSlot.getBoundingClientRect();
    var monoRect = introMono.getBoundingClientRect();
    var slotCX = slotRect.left + slotRect.width/2;
    var slotCY = slotRect.top  + slotRect.height/2;
    var monoCX = monoRect.left + monoRect.width/2;
    var monoCY = monoRect.top  + monoRect.height/2;
    var dx = slotCX - monoCX;
    var dy = slotCY - monoCY;
    var targetScale = slotRect.width / monoRect.width; // shrink to slot size

    // dip (anticipation): tiny scale-down + downward nudge
    tl.to(introMono, { scale:0.92, y:"+=10", duration:0.14, ease:"power2.in" }, 1.15);

    // ARC: x and y on separate eases so the path curves (rises then settles).
    // y uses an easeOut overshoot-ish path by going UP past then to target via two hops.
    var arcLift = -Math.min(90, Math.abs(dy) * 0.5 + 40); // how high the arc bows
    tl.to(introMono, {
      x:dx, duration:0.50, ease:"power2.inOut"
    }, 1.30);
    // y: first rise (arc apex), then drop to slot — different timing => curved path
    tl.to(introMono, {
      y:"+="+(dy*0.45 + arcLift), duration:0.24, ease:"power2.out"
    }, 1.30);
    tl.to(introMono, {
      y:slotCY - monoCY, duration:0.30, ease:"power2.in"
    }, 1.54);

    // monogram shrinks toward slot size during the flight
    tl.to(introMono, { scale:targetScale, duration:0.54, ease:"power2.inOut" }, 1.30);

    // spark DETACHES here and parks momentarily near the launch point
    tl.to(spark, { scale:1.4, duration:0.16, ease:"power2.out" }, 1.20);
    tl.to(spark, {
      // park: drift to roughly where the monogram lifted from, slight settle
      x:monoCX, y:monoCY - 24, duration:0.40, ease:"power2.out"
    }, 1.22);
    tl.to(spark, { scale:1, duration:0.30, ease:"power2.inOut" }, 1.36);

    // --- 4. DOCK w/ OVERSHOOT + CURTAIN REVEAL (1.35 -> 1.9) ---
    // overshoot settle on final scale into the slot (back.out)
    tl.to(introMono, { scale:targetScale*1.18, duration:0.16, ease:"power2.out" }, 1.66);
    tl.to(introMono, { scale:targetScale, duration:0.30, ease:"back.out(3)" }, 1.82);

    // hand off: reveal the real nav mark exactly as the flyer docks (no gap)
    tl.set(navSlot, { opacity:1 }, 1.84);
    tl.to(introMono, { opacity:0, duration:0.10 }, 1.86);

    // CLIP-WIPE the overlay away with a LIME LEADING EDGE.
    // edge appears at top and rides down as inset top grows 0 -> 100%.
    tl.set(wipeEdge, { opacity:1, bottom:"auto", top:0 }, 1.40);
    tl.to(wipeEdge, {
      top:"100%", duration:0.50, ease:"power2.inOut"
    }, 1.40);
    tl.to(overlay, {
      clipPath:"inset(100% 0 0 0)", duration:0.50, ease:"power2.inOut"
    }, 1.40);
    tl.to(wipeEdge, { opacity:0, duration:0.12 }, 1.86);
    tl.set(overlay, { display:"none" }, 1.92);

    // hero name reveals behind masks in sync with the wipe
    tl.to(lines, {
      yPercent:0, duration:0.70, ease:"expo.out", stagger:0.08
    }, 1.46);
    // supporting copy fades up just after the name
    tl.to(fades, {
      opacity:1, y:0, duration:0.6, ease:"expo.out", stagger:0.07
    }, 1.66);

    // --- 5. PAYOFF (1.85 -> 2.15): spark flies into headline, becomes the period ---
    // measure the period slot at runtime (it's laid out but invisible)
    tl.add(function(){
      var pr = period.getBoundingClientRect();
      var px = pr.left + pr.width/2;
      var py = pr.top  + pr.height/2;
      gsap.to(spark, {
        x:px, y:py, scale:1.1, duration:0.34, ease:"power3.inOut",
        onComplete:function(){
          // swap: hide spark, reveal the lime period at that exact spot
          gsap.set(spark, { opacity:0 });
          gsap.to(period, {
            opacity:1, scale:1, duration:0.30, ease:"back.out(2.4)"
          });
        }
      });
    }, 1.80);

    // final micro: barely-there lime pulse on the nav mark
    tl.fromTo(navSlot,
      { filter:"drop-shadow(0 0 0 rgba(198,255,61,0))" },
      { filter:"drop-shadow(0 0 7px rgba(198,255,61,.7))", duration:0.22, ease:"power2.out", yoyo:true, repeat:1 },
      2.06);
  }

  function finish(){
    // settle everything to clean resting values; remove overlay from a11y/flow
    if(overlay){ overlay.style.display = "none"; overlay.setAttribute("aria-hidden","true"); }
    set(spark, { opacity:0, display:"none" });
    set(period, { opacity:1, scale:1, clearProps:"filter" });
    set(navSlot, { clearProps:"filter,opacity" });
    if(navSlot) navSlot.style.opacity = "1";
    if(replayBtn) replayBtn.disabled = false;
  }

  /* ---------- boot ---------- */
  function start(){
    if(REDUCED || !hasGSAP){ showResting(); return; }
    // give fonts/layout a tick so rects are accurate
    requestAnimationFrame(function(){ requestAnimationFrame(play); });
  }

  if(replayBtn){
    replayBtn.addEventListener("click", function(){
      if(replayBtn.disabled) return;
      // bring spark/overlay back into play for a clean replay
      if(spark){ spark.style.display = "block"; }
      play();
    });
  }

  // recompute nothing on resize mid-flight (kept simple); resting state is CSS-fluid.
  if(document.readyState === "complete"){ start(); }
  else { window.addEventListener("load", start); }
})();
</script>
</body>
</html>
